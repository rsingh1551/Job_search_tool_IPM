<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rishabh Singh — Resume</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Page setup ── */
    html, body {
      font-family: 'Inter', Arial, sans-serif;
      font-size: 9.5pt;
      line-height: 1.45;
      color: #1a1a1a;
      background: #fff;
    }

    .page {
      width: 8.5in;
      min-height: 11in;
      margin: 0 auto;
      padding: 0.25in 0.4in 0.2in 0.45in;
      background: #fff;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 10px;
    }

    .header h1 {
      font-size: 20pt;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #111;
      margin-bottom: 4px;
    }

    .contact-line {
      font-size: 9pt;
      color: #444;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .contact-line a {
      color: #1a6ea8;
      text-decoration: none;
    }

    .contact-line .sep {
      color: #aaa;
    }

    /* ── Section ── */
    .section {
      margin-bottom: 10px;
    }

    .section-title {
      font-size: 9.5pt;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #111;
      padding-bottom: 3px;
      border-bottom: 1.5px solid #1a1a1a;
      margin-bottom: 7px;
    }

    /* ── Summary ── */
    .summary-text {
      color: #222;
      margin-bottom: 7px;
    }

    .summary-text strong {
      color: #111;
    }

    .highlights-label {
      font-weight: 700;
      margin-bottom: 4px;
      color: #111;
    }

    .highlights ul {
      padding-left: 14px;
    }

    .highlights ul li {
      margin-bottom: 3px;
      color: #222;
      list-style-type: disc;
    }

    /* ── Experience ── */
    .job {
      margin-bottom: 8px;
    }

    .job-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1px;
    }

    .job-company {
      font-weight: 700;
      font-size: 10pt;
      color: #1a6ea8;
    }

    .job-dates {
      font-size: 9pt;
      color: #444;
      white-space: nowrap;
    }

    .job-title {
      font-weight: 700;
      font-size: 9.5pt;
      color: #111;
      margin-bottom: 2px;
    }

    .job-desc {
      font-style: italic;
      color: #222;
      margin-bottom: 6px;
      font-size: 9pt;
    }

    .bullet-group-title {
      font-weight: 700;
      color: #111;
      margin-top: 5px;
      margin-bottom: 3px;
      font-size: 9pt;
    }

    .bullet-group ul {
      padding-left: 14px;
    }

    .bullet-group ul li {
      list-style-type: disc;
      margin-bottom: 2.5px;
      color: #222;
    }

    /* ── Education ── */
    .edu-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 2px;
    }

    .edu-school {
      font-weight: 700;
      color: #1a6ea8;
    }

    .edu-degree {
      font-weight: 600;
      color: #111;
    }

    /* ── Skills ── */
    .skill-row {
      margin-bottom: 3px;
      color: #222;
    }

    .skill-row strong {
      color: #111;
    }

    /* ── Print ── */
    @media print {
      html, body { background: #fff; }
      .page {
        width: 100%;
        margin: 0;
        padding: 0.25in 0.4in 0.2in 0.45in;
        box-shadow: none;
      }
      a { color: #1a6ea8 !important; text-decoration: none; }
    }

    /* Screen preview shadow */
    @media screen {
      body { background: #f0f0f0; padding: 32px 0; }
      .page {
        box-shadow: 0 4px 32px rgba(0,0,0,0.12);
        border-radius: 2px;
      }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- ══ HEADER ══ -->
  <div class="header">
    <h1>{{NAME}}</h1>
    <div class="contact-line">
      <a href="mailto:{{EMAIL}}">{{EMAIL}}</a>
      <span class="sep">·</span>
      <span>{{PHONE}}</span>
      <span class="sep">·</span>
      <a href="https://{{WEBSITE}}">{{WEBSITE}}</a>
      <span class="sep">·</span>
      <span>Los Angeles, CA</span>
    </div>
  </div>

  <!-- ══ SUMMARY ══ -->
  <div class="section">
    <div class="section-title">Summary</div>
    <p class="summary-text">{{SUMMARY_TEXT}}</p>
    <div class="highlights">
      <p class="highlights-label">Highlights include:</p>
      <ul>
        {{HIGHLIGHTS_ITEMS}}
      </ul>
    </div>
  </div>

  <!-- ══ EXPERIENCE ══ -->
  <div class="section">
    <div class="section-title">Experience</div>
{{EXPERIENCE_BLOCKS}}
  </div>

  <!-- ══ EDUCATION ══ -->
  <div class="section">
    <div class="section-title">Education</div>
{{EDUCATION_ROWS}}
  </div>

  <!-- ══ SKILLS ══ -->
  <div class="section">
    <div class="section-title">Skills</div>
{{SKILLS_ROWS}}
  </div>

</div>
</body>
</html>
